<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - All Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #232f3e; --secondary: #37475a; --accent: #ff9900; --background: #ffffff;
            --text: #0f1111; --text-light: #565959; --border: #dddddd; --card-bg: #ffffff;
        }
        .dark-mode {
            --primary: #131921; --secondary: #232f3e; --accent: #ff9900; --background: #0f171e;
            --text: #ffffff; --text-light: #a0a0a0; --border: #3a3a3a; --card-bg: #1a242b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            transition: background 0.3s;
        }
        .header {
            background: var(--primary); padding: 12px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .header-content {
            max-width: 1500px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 24px; font-weight: 700; color: white; text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .header-icons {
            display: flex; gap: 25px; align-items: center;
        }
        .icon-btn {
            position: relative; color: white; font-size: 20px; cursor: pointer;
        }
        .badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent); color: #000; font-size: 11px;
            padding: 2px 6px; border-radius: 20px;
        }
        .theme-toggle {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white;
        }
        .container {
            max-width: 1500px; margin: 30px auto; padding: 0 20px;
        }
        .page-title {
            font-size: 32px; margin-bottom: 30px;
        }
        .filters {
            display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .search-box {
            flex: 1; position: relative;
        }
        .search-box input {
            width: 100%; padding: 14px 20px; background: var(--background);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
        }
        .category-filter select {
            padding: 14px 20px; background: var(--background);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            min-width: 200px;
        }
        .products-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px;
        }
        .product-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px); border-color: var(--accent);
        }
        .product-image {
            height: 200px; background: var(--background);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .product-image img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .product-info { padding: 15px; }
        .product-title {
            font-size: 16px; font-weight: 600; margin-bottom: 8px;
            height: 44px; overflow: hidden;
        }
        .product-price {
            font-size: 18px; font-weight: 700; color: var(--accent);
        }
        .pagination {
            display: flex; gap: 10px; justify-content: center; margin-top: 40px;
        }
        .page-btn {
            padding: 10px 15px; background: var(--background);
            border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
        }
        .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .loading { text-align: center; padding: 50px; color: var(--text-light); }

        @media (max-width: 1200px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 992px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'"><i class="far fa-user"></i></div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'"><i class="far fa-heart"></i><span class="badge" id="wishlistCount">0</span></div>
                <div class="icon-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></div>
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">All Products</h1>
        <div class="filters">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search products..."></div>
            <div class="category-filter">
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Watches">Watches</option>
                    <option value="Home">Home</option>
                </select>
            </div>
        </div>
        <div class="products-grid" id="productsContainer"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const perPage = 12;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        auth.onAuthStateChanged(user => {
            if (user) loadCounts(user);
            loadProducts();
        });

        async function loadCounts(user) {
            const wish = await db.collection('wishlist').where('userId', '==', user.uid).get();
            document.getElementById('wishlistCount').textContent = wish.size;
            const cart = await db.collection('cart').where('userId', '==', user.uid).get();
            document.getElementById('cartCount').textContent = cart.docs.reduce((s, d) => s + (d.data().quantity || 1), 0);
        }

        async function loadProducts() {
            try {
                const snap = await db.collection('products').get();
                allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                filterProducts();
            } catch (error) {
                showSampleProducts();
            }
        }

        function showSampleProducts() {
            allProducts = [
                {id:'1', name:'Headphones', category:'Electronics', price:5499, image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'},
                {id:'2', name:'Watch', category:'Watches', price:3299, image:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'},
                {id:'3', name:'Shoes', category:'Fashion', price:4599, image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'},
                {id:'4', name:'Smart Watch', category:'Electronics', price:8999, image:'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400'}
            ];
            filterProducts();
        }

        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            filteredProducts = allProducts.filter(p => {
                const matchSearch = !search || p.name.toLowerCase().includes(search);
                const matchCat = cat === 'all' || p.category === cat;
                return matchSearch && matchCat;
            });
            displayProducts();
        }

        function displayProducts() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageProducts = filteredProducts.slice(start, end);
            const container = document.getElementById('productsContainer');
            container.innerHTML = pageProducts.map(p => `
                <div class="product-card" onclick="viewProduct('${p.id}')">
                    <div class="product-image"><img src="${p.image || p.images?.[0] || 'https://via.placeholder.com/200'}"></div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">Rs ${p.price?.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            showPagination();
        }

        function showPagination() {
            const totalPages = Math.ceil(filteredProducts.length / perPage);
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<span class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</span>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        window.goToPage = (page) => { currentPage = page; displayProducts(); };
        window.viewProduct = (id) => window.location.href = `product-detail.html?id=${id}`;
        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; filterProducts(); });
        document.getElementById('categoryFilter').addEventListener('change', () => { currentPage = 1; filterProducts(); });
    </script>
</body>
</html>
