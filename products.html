<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Products</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #232f3e;
            --secondary: #37475a;
            --accent: #ff9900;
            --background: #ffffff;
            --text: #0f1111;
            --text-light: #565959;
            --border: #dddddd;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --primary: #131921;
            --secondary: #232f3e;
            --accent: #ff9900;
            --background: #0f171e;
            --text: #ffffff;
            --text-light: #a0a0a0;
            --border: #3a3a3a;
            --card-bg: #1a242b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            transition: background 0.3s ease;
        }

        /* Header */
        .header {
            background: var(--primary);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: #000;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }

        /* Categories Bar */
        .categories {
            background: var(--secondary);
            padding: 10px 20px;
        }

        .categories-list {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
            overflow-x: auto;
        }

        .categories-list a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
            padding: 5px 0;
        }

        .categories-list a:hover,
        .categories-list a.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        /* Container */
        .container {
            max-width: 1500px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
        }

        .category-title {
            font-size: 18px;
            color: var(--accent);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }

        .category-filter select {
            padding: 12px 20px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            min-width: 200px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .product-image {
            height: 200px;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-info {
            padding: 15px;
        }

        .product-category {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            height: 44px;
            overflow: hidden;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .no-products {
            grid-column: span 4;
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 40px;
        }

        .page-btn {
            padding: 10px 15px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-light);
        }

        @media (max-width: 1200px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 992px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .no-products { grid-column: span 2; }
        }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; }
            .no-products { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'"><i class="far fa-user"></i></div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'"><i class="far fa-heart"></i><span class="badge" id="wishlistCount">0</span></div>
                <div class="icon-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></div>
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></div>
            </div>
        </div>
    </header>

    <!-- Categories Bar -->
    <div class="categories">
        <div class="categories-list" id="categoriesList">
            <a href="products.html" class="active">All Products</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title" id="pageTitle">All Products</h1>
            <span class="category-title" id="categoryTitle"></span>
        </div>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>
            <div class="category-filter">
                <select id="categoryFilter" onchange="filterByCategory(this.value)">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="productsContainer">
            <div class="loading">Loading products...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allProducts = [];
        let filteredProducts = [];
        let categories = [];
        let currentPage = 1;
        const perPage = 12;
        let selectedCategory = 'all';
        let searchTerm = '';

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        const searchParam = urlParams.get('search');

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        // Auth State
        auth.onAuthStateChanged(user => {
            if (user) loadCounts(user);
            loadData();
        });

        async function loadCounts(user) {
            const wish = await db.collection('wishlist').where('userId', '==', user.uid).get();
            document.getElementById('wishlistCount').textContent = wish.size;
            const cart = await db.collection('cart').where('userId', '==', user.uid).get();
            document.getElementById('cartCount').textContent = cart.docs.reduce((s, d) => s + (d.data().quantity || 1), 0);
        }

        // Load Categories and Products
        async function loadData() {
            await loadCategories();
            await loadProducts();
        }

        async function loadCategories() {
            try {
                const snap = await db.collection('categories').get();
                categories = snap.docs.map(doc => doc.data().name);
                
                // Update categories bar
                const categoriesList = document.getElementById('categoriesList');
                categoriesList.innerHTML = '<a href="products.html" class="active">All Products</a>';
                
                categories.forEach(cat => {
                    const activeClass = cat === categoryParam ? 'active' : '';
                    categoriesList.innerHTML += `<a href="products.html?category=${encodeURIComponent(cat)}" class="${activeClass}">${cat}</a>`;
                });
                
                // Update category filter dropdown
                const filterSelect = document.getElementById('categoryFilter');
                filterSelect.innerHTML = '<option value="all">All Categories</option>';
                categories.forEach(cat => {
                    const selected = cat === categoryParam ? 'selected' : '';
                    filterSelect.innerHTML += `<option value="${cat}" ${selected}>${cat}</option>`;
                });
                
                if (categoryParam) {
                    selectedCategory = categoryParam;
                    document.getElementById('pageTitle').textContent = categoryParam;
                    document.getElementById('categoryTitle').textContent = `${categoryParam} Products`;
                }
                
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProducts() {
            try {
                const snap = await db.collection('products').get();
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                filterProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                showSampleProducts();
            }
        }

        function filterProducts() {
            // Apply category filter
            if (selectedCategory !== 'all') {
                filteredProducts = allProducts.filter(p => p.category === selectedCategory);
            } else {
                filteredProducts = [...allProducts];
            }
            
            // Apply search filter
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(p => 
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.category?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            displayProducts();
        }

        function displayProducts() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageProducts = filteredProducts.slice(start, end);
            
            const container = document.getElementById('productsContainer');
            
            if (pageProducts.length === 0) {
                container.innerHTML = '<div class="no-products">No products found</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            container.innerHTML = pageProducts.map(p => `
                <div class="product-card" onclick="viewProduct('${p.id}')">
                    <div class="product-image">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/200'}" alt="${p.name}">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category || 'General'}</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">Rs ${p.price?.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            
            showPagination();
        }

        function showPagination() {
            const totalPages = Math.ceil(filteredProducts.length / perPage);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<span class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</span>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        window.goToPage = (page) => {
            currentPage = page;
            displayProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.filterByCategory = (category) => {
            selectedCategory = category;
            currentPage = 1;
            if (category === 'all') {
                window.location.href = 'products.html';
            } else {
                window.location.href = `products.html?category=${encodeURIComponent(category)}`;
            }
        };

        window.viewProduct = (id) => window.location.href = `product-detail.html?id=${id}`;

        // Search input
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            currentPage = 1;
            filterProducts();
        });

        function showSampleProducts() {
            allProducts = [
                { id: '1', name: 'Wireless Headphones', category: 'Electronics', price: 5499, images: ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'] },
                { id: '2', name: 'Premium Watch', category: 'Watches', price: 3299, images: ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'] },
                { id: '3', name: 'Running Shoes', category: 'Fashion', price: 4599, images: ['https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'] },
                { id: '4', name: 'Smart Watch', category: 'Electronics', price: 8999, images: ['https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400'] }
            ];
            filterProducts();
        }

        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }
    </script>
</body>
</html>
