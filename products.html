<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - All Products</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --background: #f9f9f9;
            --text: #0f1111;
            --text-light: #666;
            --border: #e0e0e0;
            --card-bg: #ffffff;
            --gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .dark-mode {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #e94560;
            --background: #121212;
            --text: #ffffff;
            --text-light: #b0b0b0;
            --border: #2d2d2d;
            --card-bg: #1e1e1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
        }

        /* Header */
        .header {
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .theme-toggle {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .theme-toggle:hover {
            background: var(--accent);
            transform: rotate(180deg);
        }

        /* Categories Bar */
        .categories-section {
            background: var(--secondary);
            padding: 20px;
        }

        .categories-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .category-chip {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .category-chip:hover {
            background: rgba(233,69,96,0.2);
            border-color: var(--accent);
        }

        .category-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
        }

        .category-title {
            color: var(--accent);
            font-size: 18px;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: var(--text);
            font-size: 15px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(233,69,96,0.2);
        }

        .product-image {
            height: 250px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
        }

        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.6s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1) rotate(3deg);
        }

        .product-info {
            padding: 20px;
        }

        .product-category {
            color: var(--accent);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .no-products {
            grid-column: span 4;
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 40px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            border-radius: 15px;
            color: var(--text);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-light);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1200px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 992px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; }
            .no-products { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'">
                    <i class="far fa-user"></i>
                </div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'">
                    <i class="far fa-heart"></i>
                    <span class="badge" id="wishlistCount">0</span>
                </div>
                <div class="icon-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cartCount">0</span>
                </div>
                <div class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-sun" id="themeIcon"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="categories-section">
        <div class="categories-grid" id="categoriesList"></div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title" id="pageTitle">All Products</h1>
            <span class="category-title" id="categoryTitle"></span>
        </div>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">
                <i class="fas fa-search"></i>
            </div>
        </div>

        <div class="products-grid" id="productsContainer">
            <div class="loading">Loading products...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allProducts = [];
        let filteredProducts = [];
        let categories = [];
        let currentPage = 1;
        const perPage = 12;
        let selectedCategory = 'all';
        let searchTerm = '';

        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        const searchParam = urlParams.get('search');

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) loadCounts();
            loadData();
        });

        async function loadCounts() {
            if (!currentUser) return;
            const wishSnap = await db.collection('wishlist').where('userId', '==', currentUser.uid).get();
            document.getElementById('wishlistCount').textContent = wishSnap.size;
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            document.getElementById('cartCount').textContent = cartSnap.docs.reduce((s, d) => s + (d.data().quantity || 1), 0);
        }

        async function loadData() {
            await loadCategories();
            await loadProducts();
        }

        async function loadCategories() {
            try {
                const snap = await db.collection('categories').get();
                categories = snap.docs.map(doc => doc.data().name);
                
                const list = document.getElementById('categoriesList');
                list.innerHTML = '<span class="category-chip" onclick="filterByCategory(\'all\')">All</span>';
                
                categories.forEach(cat => {
                    const activeClass = cat === categoryParam ? 'active' : '';
                    list.innerHTML += `<span class="category-chip ${activeClass}" onclick="filterByCategory('${cat}')">${cat}</span>`;
                });
                
                if (categoryParam) {
                    selectedCategory = categoryParam;
                    document.getElementById('pageTitle').textContent = categoryParam;
                }
                
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadProducts() {
            try {
                const snap = await db.collection('products').get();
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filterProducts();
            } catch (error) {
                console.error('Error:', error);
                showSampleProducts();
            }
        }

        function filterProducts() {
            filteredProducts = selectedCategory === 'all' ? allProducts : allProducts.filter(p => p.category === selectedCategory);
            
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(p => 
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.category?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            displayProducts();
        }

        function displayProducts() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageProducts = filteredProducts.slice(start, end);
            
            const container = document.getElementById('productsContainer');
            
            if (pageProducts.length === 0) {
                container.innerHTML = '<div class="no-products">No products found</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            container.innerHTML = pageProducts.map(p => `
                <div class="product-card" onclick="viewProduct('${p.id}')">
                    <div class="product-image">
                        <img src="${p.images?.[0] || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'}" alt="${p.name}">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category || 'General'}</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">Rs ${p.price?.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            
            showPagination();
        }

        function showPagination() {
            const totalPages = Math.ceil(filteredProducts.length / perPage);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<span class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</span>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        window.goToPage = (page) => {
            currentPage = page;
            displayProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.filterByCategory = (category) => {
            selectedCategory = category;
            currentPage = 1;
            if (category === 'all') {
                window.location.href = 'products.html';
            } else {
                window.location.href = `products.html?category=${encodeURIComponent(category)}`;
            }
        };

        window.viewProduct = (id) => window.location.href = `product-detail.html?id=${id}`;

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            currentPage = 1;
            filterProducts();
        });

        function showSampleProducts() {
            allProducts = [
                { id: '1', name: 'Wireless Headphones', category: 'Electronics', price: 5499, images: ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'] },
                { id: '2', name: 'Premium Watch', category: 'Watches', price: 3299, images: ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'] },
                { id: '3', name: 'Running Shoes', category: 'Fashion', price: 4599, images: ['https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'] },
                { id: '4', name: 'Smart Watch', category: 'Electronics', price: 8999, images: ['https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400'] }
            ];
            filterProducts();
        }
    </script>
</body>
</html>
