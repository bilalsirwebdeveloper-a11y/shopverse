<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPVERSE - My Wishlist</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* Same styles as products.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030304;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            background: rgba(3, 3, 4, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 16, 240, 0.3);
            border-radius: 40px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons .icon {
            position: relative;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #FF10F0;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .container {
            max-width: 1400px;
            margin: 120px auto 40px;
            padding: 20px;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-wishlist {
            text-align: center;
            padding: 60px;
        }

        .empty-wishlist i {
            font-size: 80px;
            color: rgba(255,16,240,0.3);
            margin-bottom: 20px;
        }

        .empty-wishlist h2 {
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }

        .empty-wishlist p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        .shop-now-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            border: none;
            border-radius: 40px;
            color: #030304;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .product-card {
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #00F5FF;
            box-shadow: 0 20px 40px rgba(0,245,255,0.3);
        }

        .product-image {
            height: 250px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .product-price {
            color: #00F5FF;
            font-weight: 600;
        }

        .remove-wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,16,240,0.9);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        @media (max-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">SHOPVERSE</a>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="account.html">Account</a>
        </nav>
        <div class="header-icons">
            <div class="icon" onclick="window.location.href='wishlist.html'" style="color: #00F5FF;">
                <i class="fas fa-heart"></i>
                <span class="badge" id="wishlistCount">0</span>
            </div>
            <div class="icon" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">My Wishlist</h1>
        
        <div id="wishlistContent">
            <div class="empty-wishlist">
                <i class="fas fa-heart"></i>
                <h2>Your wishlist is empty</h2>
                <p>Save your favorite items here</p>
                <button class="shop-now-btn" onclick="window.location.href='products.html'">Explore Products</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let wishlistItems = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadWishlist();
            } else {
                document.getElementById('wishlistContent').innerHTML = `
                    <div class="empty-wishlist">
                        <i class="fas fa-user-lock"></i>
                        <h2>Please login to view your wishlist</h2>
                        <p>You need to be logged in to see your saved items</p>
                        <button class="shop-now-btn" onclick="window.location.href='account.html'">Login</button>
                    </div>
                `;
            }
        });

        async function loadWishlist() {
            try {
                const snapshot = await db.collection('wishlist')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                wishlistItems = snapshot.docs.map(doc => doc.data().productId);
                
                if (wishlistItems.length === 0) {
                    showEmptyWishlist();
                } else {
                    displayWishlist();
                }
                
                updateCounts();
            } catch (error) {
                console.error('Error loading wishlist:', error);
            }
        }

        function showEmptyWishlist() {
            document.getElementById('wishlistContent').innerHTML = `
                <div class="empty-wishlist">
                    <i class="fas fa-heart"></i>
                    <h2>Your wishlist is empty</h2>
                    <p>Save your favorite items here</p>
                    <button class="shop-now-btn" onclick="window.location.href='products.html'">Explore Products</button>
                </div>
            `;
        }

        async function displayWishlist() {
            // Get product details for each wishlist item
            const productPromises = wishlistItems.map(async (productId) => {
                const productDoc = await db.collection('products').doc(productId).get();
                return { id: productDoc.id, ...productDoc.data() };
            });
            
            const products = await Promise.all(productPromises);
            
            let html = '<div class="products-grid">';
            
            products.forEach(product => {
                html += `
                    <div class="product-card" onclick="viewProduct('${product.id}')">
                        <div class="remove-wishlist" onclick="event.stopPropagation(); removeFromWishlist('${product.id}')">
                            <i class="fas fa-times"></i>
                        </div>
                        <div class="product-image">
                            <img src="${product.images?.[0] || product.image || 'https://via.placeholder.com/300'}" alt="${product.name}">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">Rs ${product.price?.toLocaleString() || '0'}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            
            document.getElementById('wishlistContent').innerHTML = html;
        }

        window.removeFromWishlist = async function(productId) {
            try {
                const snapshot = await db.collection('wishlist')
                    .where('userId', '==', currentUser.uid)
                    .where('productId', '==', productId)
                    .get();
                
                snapshot.forEach(doc => doc.ref.delete());
                
                wishlistItems = wishlistItems.filter(id => id !== productId);
                
                if (wishlistItems.length === 0) {
                    showEmptyWishlist();
                } else {
                    displayWishlist();
                }
                
                updateCounts();
            } catch (error) {
                console.error('Error removing from wishlist:', error);
            }
        };

        window.viewProduct = function(id) {
            window.location.href = `product-detail.html?id=${id}`;
        };

        async function updateCounts() {
            if (currentUser) {
                const wishlistSnapshot = await db.collection('wishlist')
                    .where('userId', '==', currentUser.uid)
                    .get();
                document.getElementById('wishlistCount').textContent = wishlistSnapshot.size;
                
                const cartSnapshot = await db.collection('cart')
                    .where('userId', '==', currentUser.uid)
                    .get();
                document.getElementById('cartCount').textContent = cartSnapshot.size;
            }
        }
    </script>
</body>
</html>
