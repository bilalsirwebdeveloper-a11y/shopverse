<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Wishlist</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #232f3e; --secondary: #37475a; --accent: #ff9900; --background: #ffffff;
            --text: #0f1111; --text-light: #565959; --border: #dddddd; --card-bg: #ffffff;
        }
        .dark-mode {
            --primary: #131921; --secondary: #232f3e; --accent: #ff9900; --background: #0f171e;
            --text: #ffffff; --text-light: #a0a0a0; --border: #3a3a3a; --card-bg: #1a242b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            transition: background 0.3s;
        }
        .header {
            background: var(--primary); padding: 12px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .header-content {
            max-width: 1500px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 24px; font-weight: 700; color: white; text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .header-icons {
            display: flex; gap: 25px; align-items: center;
        }
        .icon-btn {
            position: relative; color: white; font-size: 20px; cursor: pointer;
        }
        .badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent); color: #000; font-size: 11px; padding: 2px 6px; border-radius: 20px;
        }
        .theme-toggle {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white;
        }
        .container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
        }
        .page-title {
            font-size: 32px; margin-bottom: 30px;
        }
        .empty-wishlist {
            text-align: center; padding: 60px;
        }
        .empty-wishlist i {
            font-size: 80px; color: var(--text-light); margin-bottom: 20px;
        }
        .shop-now-btn {
            padding: 15px 40px; background: var(--accent); border: none;
            border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .products-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px;
        }
        .product-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer; position: relative;
        }
        .product-image {
            height: 200px; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .product-image img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .product-info { padding: 15px; }
