<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Product Details</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #232f3e;
            --secondary: #37475a;
            --accent: #ff9900;
            --background: #ffffff;
            --text: #0f1111;
            --text-light: #565959;
            --border: #dddddd;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --primary: #131921;
            --secondary: #232f3e;
            --accent: #ff9900;
            --background: #0f171e;
            --text: #ffffff;
            --text-light: #a0a0a0;
            --border: #3a3a3a;
            --card-bg: #1a242b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            transition: background 0.3s ease;
        }

        /* Header */
        .header {
            background: var(--primary);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: #000;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 40px;
        }

        /* Gallery */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-image {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .thumbnails {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .thumbnail:hover {
            border-color: var(--accent);
        }

        .thumbnail.active {
            border-color: var(--accent);
        }

        .thumbnail img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Product Info */
        .product-category {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .product-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .product-rating {
            color: #ffc107;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .product-rating span {
            color: var(--text-light);
            margin-left: 5px;
        }

        .product-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .product-description {
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .quantity {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .quantity-input {
            width: 60px;
            height: 40px;
            text-align: center;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }

        .product-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-secondary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: #ffaa33; }
        .btn-secondary:hover { background: var(--secondary); }

        /* Order Form */
        .order-form {
            margin-top: 30px;
            padding: 25px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: none;
        }

        .order-form h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .payment-method {
            flex: 1;
            padding: 15px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-method.selected {
            border-color: var(--accent);
            background: rgba(255,153,0,0.1);
        }

        .payment-method i {
            font-size: 24px;
            margin-bottom: 5px;
            display: block;
        }

        .payment-details {
            padding: 15px;
            background: rgba(255,153,0,0.1);
            border-radius: 8px;
            margin: 15px 0;
        }

        .store-account {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            padding: 10px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin: 10px 0;
        }

        .order-summary {
            margin-top: 20px;
            padding: 20px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: 10px;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: var(--text-light);
            text-decoration: none;
        }

        .back-link:hover { color: var(--accent); }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .product-container { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .payment-methods { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'"><i class="far fa-user"></i></div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'"><i class="far fa-heart"></i><span class="badge" id="wishlistCount">0</span></div>
                <div class="icon-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></div>
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="product-container" id="productContainer"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentProduct = null;
        let quantity = 1;
        let selectedPayment = 'easypaisa';
        let currentImageIndex = 0;

        const STORE_ACCOUNT = {
            easypaisa: { number: "03001234567", title: "ZYVORA STORE" },
            jazzcash: { number: "03001234567", title: "ZYVORA STORE" }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const buyNow = urlParams.get('buynow') === 'true';

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        // Auth State
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) loadCounts();
            loadProduct();
        });

        async function loadCounts() {
            if (!currentUser) return;
            const wishSnap = await db.collection('wishlist').where('userId', '==', currentUser.uid).get();
            document.getElementById('wishlistCount').textContent = wishSnap.size;
            const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
            document.getElementById('cartCount').textContent = cartSnap.docs.reduce((s, d) => s + (d.data().quantity || 1), 0);
        }

        // Load Product
        async function loadProduct() {
            if (!productId) return window.location.href = 'products.html';
            
            try {
                const doc = await db.collection('products').doc(productId).get();
                if (doc.exists) {
                    currentProduct = { id: doc.id, ...doc.data() };
                } else {
                    currentProduct = {
                        id: productId,
                        name: 'Wireless Headphones',
                        price: 5499,
                        category: 'Electronics',
                        description: 'Premium quality wireless headphones with noise cancellation.',
                        images: [
                            'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
                            'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=400',
                            'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400'
                        ],
                        rating: 4.5,
                        reviews: 128
                    };
                }
                displayProduct();
                if (buyNow) showOrderForm();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayProduct() {
            const images = currentProduct.images || [currentProduct.image || 'https://via.placeholder.com/400'];
            
            document.getElementById('productContainer').innerHTML = `
                <div class="gallery">
                    <div class="main-image">
                        <img src="${images[currentImageIndex]}" alt="${currentProduct.name}" id="mainImage">
                    </div>
                    <div class="thumbnails">
                        ${images.map((img, i) => `
                            <div class="thumbnail ${i === currentImageIndex ? 'active' : ''}" onclick="changeImage(${i})">
                                <img src="${img}" alt="Thumbnail ${i+1}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div>
                    <div class="product-category">${currentProduct.category || 'General'}</div>
                    <h1 class="product-title">${currentProduct.name}</h1>
                    <div class="product-rating">
                        ${generateStars(currentProduct.rating || 4.5)}
                        <span>(${currentProduct.reviews || 0} reviews)</span>
                    </div>
                    <div class="product-price">Rs ${currentProduct.price?.toLocaleString()}</div>
                    <p class="product-description">${currentProduct.description || 'No description available.'}</p>
                    
                    <div class="quantity">
                        <button class="quantity-btn" onclick="changeQty(-1)">-</button>
                        <input class="quantity-input" id="qty" value="1" readonly>
                        <button class="quantity-btn" onclick="changeQty(1)">+</button>
                    </div>
                    
                    <div class="product-actions">
                        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
                        <button class="btn btn-secondary" onclick="showOrderForm()">Buy Now</button>
                    </div>
                    
                    <div class="order-form" id="orderForm">
                        <h3>Complete Your Order</h3>
                        
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="fullName" placeholder="Enter your full name" value="${currentUser?.displayName || ''}">
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" id="phone" placeholder="03XXXXXXXXX">
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" value="${currentUser?.email || ''}">
                        </div>
                        
                        <div class="form-group">
                            <label>Delivery Address</label>
                            <textarea id="address" rows="3" placeholder="Complete address"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Method</label>
                            <div class="payment-methods">
                                <div class="payment-method easypaisa selected" onclick="selectPayment('easypaisa')">
                                    <i class="fas fa-mobile-alt"></i> EasyPaisa
                                </div>
                                <div class="payment-method jazzcash" onclick="selectPayment('jazzcash')">
                                    <i class="fas fa-mobile-alt"></i> JazzCash
                                </div>
                            </div>
                        </div>
                        
                        <div class="payment-details" id="paymentDetails">
                            <p>Send exact amount to:</p>
                            <div class="store-account">Rs ${(currentProduct.price * quantity).toLocaleString()}</div>
                            <div class="store-account">${STORE_ACCOUNT.easypaisa.number}</div>
                            <p style="text-align: center;">Account Title: <strong>${STORE_ACCOUNT.easypaisa.title}</strong></p>
                            <p style="margin-top: 15px;">After payment, enter Transaction ID:</p>
                        </div>
                        
                        <div class="form-group">
                            <label>Transaction ID</label>
                            <input type="text" id="transactionId" placeholder="Enter transaction ID">
                        </div>
                        
                        <div class="order-summary">
                            <div class="summary-row">
                                <span>Product:</span>
                                <span>${currentProduct.name}</span>
                            </div>
                            <div class="summary-row">
                                <span>Quantity:</span>
                                <span id="summaryQty">${quantity}</span>
                            </div>
                            <div class="summary-total">
                                <span>Total:</span>
                                <span>Rs ${(currentProduct.price * quantity).toLocaleString()}</span>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
                        <button class="btn btn-secondary" onclick="hideOrderForm()" style="margin-top: 10px;">Cancel</button>
                    </div>
                    
                    <a href="products.html" class="back-link">← Back to Products</a>
                </div>
            `;
        }

        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
            }
            return stars;
        }

        window.changeImage = (index) => {
            currentImageIndex = index;
            document.getElementById('mainImage').src = currentProduct.images[index];
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        };

        window.changeQty = (change) => {
            quantity = Math.max(1, quantity + change);
            document.getElementById('qty').value = quantity;
            if (document.getElementById('summaryQty')) {
                document.getElementById('summaryQty').textContent = quantity;
                document.querySelector('.summary-total span:last-child').textContent = 'Rs ' + (currentProduct.price * quantity).toLocaleString();
            }
        };

        window.addToCart = async () => {
            if (!currentUser) return window.location.href = 'account.html';
            
            try {
                const existing = await db.collection('cart')
                    .where('userId', '==', currentUser.uid)
                    .where('productId', '==', currentProduct.id)
                    .get();
                
                if (!existing.empty) {
                    const cartItem = existing.docs[0];
                    await cartItem.ref.update({ quantity: cartItem.data().quantity + quantity });
                } else {
                    await db.collection('cart').add({
                        userId: currentUser.uid,
                        productId: currentProduct.id,
                        quantity: quantity,
                        addedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                showNotification('Added to cart!');
                loadCounts();
            } catch (error) {
                showNotification('Error', 'error');
            }
        };

        window.showOrderForm = () => {
            if (!currentUser) return window.location.href = 'account.html';
            document.getElementById('orderForm').style.display = 'block';
            window.scrollTo({ top: document.getElementById('orderForm').offsetTop, behavior: 'smooth' });
        };

        window.hideOrderForm = () => {
            document.getElementById('orderForm').style.display = 'none';
        };

        window.selectPayment = (method) => {
            selectedPayment = method;
            document.querySelectorAll('.payment-method').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            
            const details = document.getElementById('paymentDetails');
            details.innerHTML = `
                <p>Send exact amount to:</p>
                <div class="store-account">Rs ${(currentProduct.price * quantity).toLocaleString()}</div>
                <div class="store-account">${STORE_ACCOUNT[method].number}</div>
                <p style="text-align: center;">Account Title: <strong>${STORE_ACCOUNT[method].title}</strong></p>
                <p style="margin-top: 15px;">After payment, enter Transaction ID:</p>
            `;
        };

        window.placeOrder = async () => {
            if (!currentUser) return;
            
            const fullName = document.getElementById('fullName')?.value;
            const phone = document.getElementById('phone')?.value;
            const address = document.getElementById('address')?.value;
            const transactionId = document.getElementById('transactionId')?.value;
            
            if (!fullName || !phone || !address || !transactionId) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            const order = {
                userId: currentUser.uid,
                customerName: fullName,
                customerPhone: phone,
                customerEmail: document.getElementById('email').value || currentUser.email,
                items: [{
                    productId: currentProduct.id,
                    productName: currentProduct.name,
                    price: currentProduct.price,
                    quantity: quantity,
                    total: currentProduct.price * quantity
                }],
                totalAmount: currentProduct.price * quantity,
                deliveryAddress: address,
                paymentMethod: selectedPayment,
                transactionId: transactionId,
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                const orderRef = await db.collection('orders').add(order);
                await orderRef.update({ orderId: orderRef.id });
                showNotification('Order placed successfully!');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (error) {
                showNotification('Error placing order', 'error');
            }
        };

        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }
    </script>
</body>
</html>
