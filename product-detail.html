<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ZYVORASHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        /* Header Styles */
        .header {
            background: #131921;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-content {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #ff9900; }
            50% { text-shadow: 0 0 20px #ff9900, 0 0 30px #ff9900; }
        }

        .logo span {
            color: #ff9900;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #ff9900;
            transform: translateX(-5px);
        }

        .back-btn i {
            margin-right: 8px;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Product Detail Card */
        .product-detail {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.8s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Product Gallery with Zoom */
        .product-gallery {
            position: relative;
        }

        .main-image-container {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 20px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .main-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        /* Zoom Lens Effect */
        .zoom-lens {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 3px solid #ff9900;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(255,153,0,0.5);
            animation: pulse 2s infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.4; }
        }

        .main-image-container:hover .zoom-lens {
            display: block;
        }

        .main-image-container:hover .main-image {
            transform: scale(2);
        }

        /* Image Badges */
        .image-badges {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .badge {
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            animation: slideInLeft 0.5s ease;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .badge.new {
            background: #4CAF50;
            color: white;
            box-shadow: 0 5px 15px rgba(76,175,80,0.3);
        }

        .badge.sale {
            background: #ff4444;
            color: white;
            box-shadow: 0 5px 15px rgba(255,68,68,0.3);
        }

        .badge.premium {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Thumbnail Gallery */
        .thumbnail-gallery {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: #ff9900 #f0f0f0;
        }

        .thumbnail-gallery::-webkit-scrollbar {
            height: 5px;
        }

        .thumbnail-gallery::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .thumbnail-gallery::-webkit-scrollbar-thumb {
            background: #ff9900;
            border-radius: 10px;
        }

        .thumbnail {
            min-width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .thumbnail:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .thumbnail.active {
            border-color: #ff9900;
            transform: scale(1.05);
            animation: pulseBorder 2s infinite;
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: #ff9900; }
            50% { border-color: #ffd700; }
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Product Info */
        .product-info {
            animation: fadeInRight 0.8s ease;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .product-category {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .product-info h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Rating Stars */
        .product-rating {
            margin-bottom: 20px;
        }

        .stars {
            display: inline-block;
            color: #ffd700;
            font-size: 20px;
            animation: starPulse 2s infinite;
        }

        @keyframes starPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .stars i {
            margin-right: 3px;
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        }

        .rating-count {
            color: #666;
            margin-left: 10px;
            font-size: 16px;
        }

        /* Price */
        .price-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .price-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,153,0,0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .old-price {
            color: #999;
            text-decoration: line-through;
            font-size: 20px;
            margin-right: 15px;
        }

        .current-price {
            font-size: 42px;
            font-weight: 700;
            color: #b12704;
            animation: pricePulse 2s infinite;
        }

        @keyframes pricePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .discount {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            margin-left: 15px;
            animation: flash 2s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Product Description */
        .product-description {
            margin-bottom: 30px;
        }

        .product-description h3 {
            font-size: 20px;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .product-description h3::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, #ff9900, transparent);
            animation: lineWidth 3s infinite;
        }

        @keyframes lineWidth {
            0%, 100% { width: 50%; }
            50% { width: 100%; }
        }

        .product-description p {
            color: #666;
            line-height: 1.8;
            font-size: 16px;
        }

        /* Key Features */
        .key-features {
            margin-bottom: 30px;
        }

        .key-features h3 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .features-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease backwards;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }
        .feature-item:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-item:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateX(10px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .feature-item i {
            color: #ff9900;
            font-size: 20px;
        }

        .feature-item:hover i {
            color: white;
        }

        /* Action Buttons */
        .product-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-add, .btn-buy {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-add {
            background: linear-gradient(135deg, #ffd814 0%, #f7ca00 100%);
            color: #131921;
        }

        .btn-buy {
            background: linear-gradient(135deg, #ffa41c 0%, #ff8c00 100%);
            color: white;
        }

        .btn-add::before, .btn-buy::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-add:hover::before, .btn-buy:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-add:hover, .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .btn-add:active, .btn-buy:active {
            transform: translateY(0);
        }

        /* Delivery Info Cards */
        .delivery-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
            animation: cardFloat 3s infinite;
        }

        .info-card:nth-child(1) { animation-delay: 0s; }
        .info-card:nth-child(2) { animation-delay: 0.2s; }
        .info-card:nth-child(3) { animation-delay: 0.4s; }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .info-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(102,126,234,0.4);
        }

        .info-card i {
            font-size: 30px;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.5));
        }

        .info-card h4 {
            margin-bottom: 5px;
            font-size: 16px;
        }

        .info-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Loading Animation */
        .loading-container {
            text-align: center;
            padding: 80px;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff9900;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(255,153,0,0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 18px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            box-shadow: 0 15px 40px rgba(102,126,234,0.4);
            z-index: 9999;
            animation: notificationSlide 0.5s ease, notificationPulse 2s infinite;
            font-weight: 500;
        }

        @keyframes notificationSlide {
            from {
                transform: translateX(100%) rotate(10deg);
                opacity: 0;
            }
            to {
                transform: translateX(0) rotate(0);
                opacity: 1;
            }
        }

        @keyframes notificationPulse {
            0%, 100% { box-shadow: 0 15px 40px rgba(102,126,234,0.4); }
            50% { box-shadow: 0 15px 60px rgba(102,126,234,0.8); }
        }

        /* Responsive */
        @media (max-width: 992px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .features-list {
                grid-template-columns: 1fr;
            }
            
            .delivery-info {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .product-info h1 {
                font-size: 28px;
            }
            
            .current-price {
                font-size: 32px;
            }
            
            .product-actions {
                flex-direction: column;
            }
        }

        /* 360 View Indicator */
        .view-360 {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 10;
            animation: bounce 2s infinite;
        }

        .view-360 i {
            margin-right: 5px;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Shopping</a>
        </div>
    </header>

    <div class="container">
        <div class="product-detail" id="productDetail">
            <div class="loading-container" id="loadingContainer">
                <div class="loader"></div>
                <p style="color: #666; font-size: 18px; animation: pulse 2s infinite;">Loading amazing product for you...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentImageIndex = 0;
        let productImages = [];

        auth.onAuthStateChanged((user) => {
            currentUser = user;
        });

        function getProductIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadProduct() {
            const productId = getProductIdFromUrl();
            
            // Show loading for 1.5 seconds (premium feel)
            setTimeout(async () => {
                if (!productId) {
                    showSampleProduct();
                    return;
                }
                
                try {
                    const productSnap = await db.collection('products').doc(productId).get();
                    
                    if (productSnap.exists) {
                        renderProduct({ id: productId, ...productSnap.data() });
                    } else {
                        showSampleProduct();
                    }
                } catch (error) {
                    console.error('Error loading product:', error);
                    showSampleProduct();
                }
            }, 1500);
        }

        function renderProduct(product) {
            productImages = product.images || [
                'https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=800',
                'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800',
                'https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800',
                'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800',
                'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800'
            ];
            
            const rating = product.rating || 4.5;
            const reviews = product.reviews || 1233;
            const discount = product.discount || 20;
            
            document.getElementById('loadingContainer').style.display = 'none';
            
            document.getElementById('productDetail').innerHTML = `
                <div class="product-gallery">
                    <div class="image-badges">
                        ${product.badge === 'NEW' ? '<span class="badge new">New Arrival</span>' : ''}
                        ${product.badge === 'SALE' ? '<span class="badge sale">Sale</span>' : ''}
                        ${product.category === 'FASHION PREMIUM' ? '<span class="badge premium">Premium</span>' : ''}
                        ${discount ? `<span class="badge sale">-${discount}%</span>` : ''}
                    </div>
                    
                    <div class="view-360">
                        <i class="fas fa-sync-alt"></i> 360° View
                    </div>
                    
                    <div class="main-image-container" id="mainImageContainer">
                        <img src="${productImages[0]}" alt="${product.name}" class="main-image" id="mainImage">
                        <div class="zoom-lens" id="zoomLens"></div>
                    </div>
                    
                    <div class="thumbnail-gallery">
                        ${productImages.map((img, index) => `
                            <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeImage(${index})">
                                <img src="${img}" alt="Thumbnail ${index + 1}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="product-info">
                    <span class="product-category">${product.category || 'FASHION'}</span>
                    <h1>${product.name || 'Premium Product'}</h1>
                    
                    <div class="product-rating">
                        <span class="stars">
                            ${generateStars(rating)}
                        </span>
                        <span class="rating-count">${reviews.toLocaleString()} reviews</span>
                    </div>
                    
                    <div class="price-section">
                        ${product.oldPrice ? `<span class="old-price">Rs ${product.oldPrice.toLocaleString()}</span>` : ''}
                        <span class="current-price">Rs ${product.price?.toLocaleString() || '1,233'}</span>
                        ${discount ? `<span class="discount">${discount}% OFF</span>` : ''}
                    </div>
                    
                    <div class="product-description">
                        <h3>About this item</h3>
                        <p>${product.description || 'Experience premium quality with this amazing product. Designed for comfort and style, perfect for any occasion. Made with high-quality materials and attention to detail.'}</p>
                    </div>
                    
                    <div class="key-features">
                        <h3>Key Features</h3>
                        <div class="features-list">
                            <div class="feature-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Premium Quality</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-truck"></i>
                                <span>Free Delivery</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-undo"></i>
                                <span>7 Days Return</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-shield-alt"></i>
                                <span>1 Year Warranty</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="product-actions">
                        <button class="btn-add" onclick="addToCart('${product.id}')">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>
                        <button class="btn-buy" onclick="buyNow('${product.id}')">
                            <i class="fas fa-bolt"></i> Buy Now
                        </button>
                    </div>
                    
                    <div class="delivery-info">
                        <div class="info-card">
                            <i class="fas fa-truck"></i>
                            <h4>Free Delivery</h4>
                            <p>Arrives in 3-5 days</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-shield-alt"></i>
                            <h4>Secure Payment</h4>
                            <p>100% Protected</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-headset"></i>
                            <h4>24/7 Support</h4>
                            <p>Always here to help</p>
                        </div>
                    </div>
                </div>
            `;

            // Initialize zoom functionality
            initializeZoom();
        }

        function showSampleProduct() {
            renderProduct({
                id: 'sample',
                name: 'new trending',
                category: 'FASHION',
                price: 1233,
                oldPrice: 1999,
                discount: 38,
                rating: 4.5,
                reviews: 1233,
                description: 'Trending fashion item with premium quality. Perfect for any occasion. Made with high-quality fabric and modern design.',
                badge: 'NEW',
                images: [
                    'https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=800',
                    'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800',
                    'https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800',
                    'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800',
                    'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800'
                ]
            });
        }

        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<i class="fas fa-star"></i>';
                } else if (i - rating < 1) {
                    stars += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    stars += '<i class="far fa-star"></i>';
                }
            }
            return stars;
        }

        // Image zoom functionality
        function initializeZoom() {
            const container = document.getElementById('mainImageContainer');
            const image = document.getElementById('mainImage');
            const lens = document.getElementById('zoomLens');

            container.addEventListener('mousemove', function(e) {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const lensSize = 150;
                const imageWidth = image.width;
                const imageHeight = image.height;
                
                let lensX = x - lensSize / 2;
                let lensY = y - lensSize / 2;
                
                // Keep lens within bounds
                lensX = Math.max(0, Math.min(lensX, rect.width - lensSize));
                lensY = Math.max(0, Math.min(lensY, rect.height - lensSize));
                
                lens.style.left = lensX + 'px';
                lens.style.top = lensY + 'px';
                
                // Calculate zoom position
                const zoomX = (lensX / (rect.width - lensSize)) * (imageWidth - rect.width);
                const zoomY = (lensY / (rect.height - lensSize)) * (imageHeight - rect.height);
                
                image.style.transformOrigin = `${zoomX}px ${zoomY}px`;
            });

            container.addEventListener('mouseleave', function() {
                image.style.transform = 'scale(1)';
                image.style.transformOrigin = 'center';
            });
        }

        // Change image
        window.changeImage = function(index) {
            currentImageIndex = index;
            const mainImage = document.getElementById('mainImage');
            mainImage.src = productImages[index];
            
            // Update active thumbnail
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                if (i === index) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        };

        // Add to cart
        window.addToCart = async function(productId) {
            if (!currentUser) {
                showNotification('Please sign in first');
                setTimeout(() => {
                    window.location.href = 'account.html';
                }, 1500);
                return;
            }
            
            try {
                const existingCart = await db.collection('cart')
                    .where('userId', '==', currentUser.uid)
                    .where('productId', '==', productId)
                    .get();
                
                if (!existingCart.empty) {
                    const cartItem = existingCart.docs[0];
                    await cartItem.ref.update({
                        quantity: (cartItem.data().quantity || 1) + 1
                    });
                } else {
                    await db.collection('cart').add({
                        userId: currentUser.uid,
                        productId: productId,
                        quantity: 1,
                        addedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                showNotification('✨ Added to cart successfully!');
                
            } catch (error) {
                console.error('Error adding to cart:', error);
                showNotification('Error adding to cart');
            }
        };

        // Buy now
        window.buyNow = function(productId) {
            if (!currentUser) {
                showNotification('Please sign in first');
                setTimeout(() => {
                    window.location.href = 'account.html';
                }, 1500);
                return;
            }
            
            showNotification('🛒 Redirecting to checkout...');
            setTimeout(() => {
                window.location.href = `checkout.html?product=${productId}`;
            }, 1000);
        };

        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'notificationSlide 0.5s ease reverse';
                setTimeout(() => {
                    notification.remove();
                }, 500);
            }, 2500);
        }

        // Check for buy now parameter
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('buynow') === 'true') {
            setTimeout(() => {
                if (confirm('🛍️ Proceed to checkout?')) {
                    window.location.href = `checkout.html?product=${getProductIdFromUrl()}`;
                }
            }, 2000);
        }

        // Load product
        loadProduct();
    </script>
</body>
</html>
