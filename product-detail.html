<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Product Details</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a8a8a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-menu a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: #fff;
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            border-color: #ff00ff;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px;
        }

        .product-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .product-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-price {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .product-category {
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .product-description {
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .quantity-input {
            width: 60px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
        }

        .btn-secondary:hover {
            border-color: #ff00ff;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }

        .back-link:hover {
            color: #00ffff;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            z-index: 9999;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORASHOP</a>
            <nav class="nav-menu">
                <a href="index.html">HOME</a>
                <a href="products.html">PRODUCTS</a>
                <a href="cart.html">CART</a>
            </nav>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='wishlist.html'">
                    <i class="far fa-heart"></i>
                    <span class="badge" id="wishlistCount">0</span>
                </div>
                <div class="icon-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="badge" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="product-container" id="productContainer">
            <!-- Product loaded via JS -->
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentProduct = null;
        let quantity = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateCartCount();
            loadProduct();
        });

        async function loadProduct() {
            if (!productId) {
                window.location.href = 'products.html';
                return;
            }

            try {
                const doc = await db.collection('products').doc(productId).get();
                if (doc.exists) {
                    currentProduct = { id: doc.id, ...doc.data() };
                } else {
                    currentProduct = {
                        id: productId,
                        name: 'Luxury Watch',
                        price: 54999,
                        category: 'Watches',
                        description: 'Premium luxury timepiece with exquisite craftsmanship.',
                        image: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=400'
                    };
                }
                displayProduct();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayProduct() {
            document.getElementById('productContainer').innerHTML = `
                <img src="${currentProduct.image}" class="product-image">
                <div>
                    <div class="product-category">${currentProduct.category}</div>
                    <h1 class="product-title">${currentProduct.name}</h1>
                    <div class="product-price">Rs ${currentProduct.price.toLocaleString()}</div>
                    <p class="product-description">${currentProduct.description}</p>
                    
                    <div class="quantity-selector">
                        <button class="quantity-btn" onclick="changeQuantity(-1)">-</button>
                        <input class="quantity-input" id="quantity" value="1" readonly>
                        <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="addToCart()">ADD TO CART</button>
                        <button class="btn btn-secondary" onclick="buyNow()">BUY NOW</button>
                    </div>
                    
                    <a href="products.html" class="back-link">← Back to Products</a>
                </div>
            `;
        }

        window.changeQuantity = function(change) {
            quantity = Math.max(1, quantity + change);
            document.getElementById('quantity').value = quantity;
        };

        window.addToCart = function() {
            if (!currentUser) {
                window.location.href = 'account.html';
                return;
            }
            showNotification('Added to cart!');
        };

        window.buyNow = function() {
            if (!currentUser) {
                window.location.href = 'account.html';
                return;
            }
            showNotification('Proceeding to checkout...');
        };

        async function updateCartCount() {
            // Update counts logic here
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
    </script>
</body>
</html>
