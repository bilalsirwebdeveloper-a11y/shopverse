<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPVERSE - Phone Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #030304;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .phone-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #FF10F0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input:focus {
            outline: none;
            border-color: #00F5FF;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            border: none;
            border-radius: 10px;
            color: #030304;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,16,240,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #FF10F0;
            color: white;
        }
        .phone-input-row {
            display: flex;
            gap: 10px;
        }
        .country-code {
            width: 100px;
            flex-shrink: 0;
        }
        .phone-number {
            flex: 1;
        }
        .otp-input {
            letter-spacing: 8px;
            font-size: 24px;
            text-align: center;
        }
        .timer {
            text-align: center;
            color: #00F5FF;
            margin: 10px 0;
            font-size: 18px;
        }
        .error-message {
            background: rgba(255,16,240,0.2);
            border: 1px solid #FF10F0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #FF10F0;
            text-align: center;
            display: none;
        }
        .success-message {
            background: rgba(0,245,255,0.2);
            border: 1px solid #00F5FF;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #00F5FF;
            text-align: center;
            display: none;
        }
        .recaptcha-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        .back-link a:hover {
            color: #00F5FF;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="phone-box">
            <div class="logo">SHOPVERSE</div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- STEP 1: Phone Number Input -->
            <div id="step1" class="step active">
                <h2>Phone Login</h2>
                <p style="text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 20px;">
                    Enter your phone number to receive OTP
                </p>
                <div class="form-group">
                    <label>Country</label>
                    <select id="countryCode">
                        <option value="+91">India (+91)</option>
                        <option value="+1">USA (+1)</option>
                        <option value="+92" selected>Pakistan (+92)</option>
                        <option value="+44">UK (+44)</option>
                        <option value="+971">UAE (+971)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="phone-input-row">
                        <input type="text" class="country-code" id="countryCodeDisplay" value="+92" readonly disabled>
                        <input type="tel" class="phone-number" id="phoneNumber" placeholder="300 1234567" value="3001234567">
                    </div>
                </div>
                <p style="color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 20px;">
                    <i class="fas fa-info-circle"></i> You'll receive a 6-digit verification code via SMS
                </p>
                <button class="btn" id="sendOtpBtn" onclick="sendOTP()">
                    <i class="fas fa-paper-plane"></i> Send OTP
                </button>
                <div class="recaptcha-container" id="recaptcha-container"></div>
            </div>
            
            <!-- STEP 2: OTP Verification -->
            <div id="step2" class="step">
                <h2>Verify OTP</h2>
                <p style="text-align: center; margin-bottom: 20px; color: #00F5FF;" id="displayPhone"></p>
                <div class="form-group">
                    <label>Enter 6-digit OTP</label>
                    <input type="text" id="otp" class="otp-input" maxlength="6" placeholder="------" inputmode="numeric">
                </div>
                <div id="timer" class="timer">02:00</div>
                <button class="btn" id="verifyBtn" onclick="verifyOTP()">
                    <i class="fas fa-check"></i> Verify & Login
                </button>
                <button class="btn btn-outline" onclick="resendOTP()" id="resendBtn" disabled>
                    Resend OTP (<span id="timerDisplay">120</span>s)
                </button>
                <p style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="goToStep1()" style="color: #FF10F0;">← Change phone number</a>
                </p>
            </div>
            
            <div class="back-link">
                <a href="account.html"><i class="fas fa-arrow-left"></i> Back to Email Login</a>
            </div>
        </div>
    </div>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable phone auth
        auth.useDeviceLanguage();
        
        // Global variables
        let confirmationResult = null;
        let timerInterval = null;
        let timeLeft = 120;
        
        // Initialize reCAPTCHA
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'normal',
            'callback': (response) => {
                console.log('✅ reCAPTCHA solved');
            },
            'expired-callback': () => {
                showError('reCAPTCHA expired. Please try again.');
            }
        });
        
        // Update country code display
        document.getElementById('countryCode').addEventListener('change', function() {
            document.getElementById('countryCodeDisplay').value = this.value;
        });
        
        // Show error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }
        
        // Show success
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = message;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        // Send OTP
        window.sendOTP = function() {
            const countryCode = document.getElementById('countryCode').value;
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!phoneNumber) {
                showError('Please enter phone number');
                return;
            }
            
            // Format: +923001234567
            const fullPhoneNumber = countryCode + phoneNumber.replace(/\D/g, '');
            
            // Validate Pakistani number format
            if (countryCode === '+92' && !phoneNumber.match(/^3\d{9}$/)) {
                showError('Invalid Pakistani number. Use format: 3001234567');
                return;
            }
            
            // Disable button
            const btn = document.getElementById('sendOtpBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            
            // Show phone number in step 2
            document.getElementById('displayPhone').textContent = fullPhoneNumber;
            
            // Send OTP
            auth.signInWithPhoneNumber(fullPhoneNumber, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    
                    // Move to step 2
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    
                    // Start timer
                    startTimer(120);
                    
                    showSuccess('OTP sent successfully!');
                    
                    // Reset button
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
                })
                .catch((error) => {
                    console.error('❌ OTP send error:', error);
                    
                    if (error.code === 'auth/invalid-phone-number') {
                        showError('Invalid phone number format');
                    } else if (error.code === 'auth/too-many-requests') {
                        showError('Too many attempts. Try again later.');
                    } else if (error.code === 'auth/quota-exceeded') {
                        showError('SMS quota exceeded. Try email login.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
                    
                    // Reset reCAPTCHA
                    window.recaptchaVerifier.clear();
                    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                        'size': 'normal'
                    });
                });
        };
        
        // Verify OTP
        window.verifyOTP = function() {
            const otp = document.getElementById('otp').value.trim();
            
            if (!otp || otp.length !== 6) {
                showError('Please enter 6-digit OTP');
                return;
            }
            
            if (!confirmationResult) {
                showError('Please request OTP first');
                return;
            }
            
            // Disable button
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            
            confirmationResult.confirm(otp)
                .then((result) => {
                    const user = result.user;
                    console.log('✅ Phone login successful:', user.phoneNumber);
                    
                    // Check if user exists in Firestore
                    return db.collection('users').doc(user.uid).get().then((doc) => {
                        if (!doc.exists) {
                            // Create new user document
                            return db.collection('users').doc(user.uid).set({
                                phoneNumber: user.phoneNumber,
                                name: user.displayName || 'User',
                                isAdmin: false,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                                authMethod: 'phone'
                            });
                        } else {
                            // Update last login
                            return db.collection('users').doc(user.uid).update({
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    });
                })
                .then(() => {
                    // Stop timer
                    if (timerInterval) clearInterval(timerInterval);
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('❌ OTP verification error:', error);
                    
                    if (error.code === 'auth/invalid-verification-code') {
                        showError('Invalid OTP. Please try again.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> Verify & Login';
                });
        };
        
        // Resend OTP
        window.resendOTP = function() {
            // Reset timer
            if (timerInterval) clearInterval(timerInterval);
            
            // Disable resend button
            document.getElementById('resendBtn').disabled = true;
            
            // Send OTP again
            const countryCode = document.getElementById('countryCode').value;
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const fullPhoneNumber = countryCode + phoneNumber.replace(/\D/g, '');
            
            auth.signInWithPhoneNumber(fullPhoneNumber, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    startTimer(120);
                    showSuccess('OTP resent successfully!');
                })
                .catch((error) => {
                    showError('Failed to resend OTP: ' + error.message);
                });
        };
        
        // Timer function
        function startTimer(seconds) {
            timeLeft = seconds;
            
            const timerDisplay = document.getElementById('timerDisplay');
            const timerDiv = document.getElementById('timer');
            const resendBtn = document.getElementById('resendBtn');
            
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerDiv.textContent = 'OTP expired. Request again.';
                }
            }, 1000);
            
            function updateTimerDisplay() {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDiv.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                timerDisplay.textContent = timeLeft;
            }
        }
        
        // Go back to step 1
        window.goToStep1 = function() {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            
            if (timerInterval) clearInterval(timerInterval);
            
            // Reset reCAPTCHA
            window.recaptchaVerifier.clear();
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal'
            });
        };
        
        // Handle auth state
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log('✅ User logged in:', user.email || user.phoneNumber);
            }
        });
    </script>
</body>
</html>
