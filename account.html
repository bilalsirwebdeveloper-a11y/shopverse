<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPVERSE - Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030304;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: block;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #FF10F0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00F5FF;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            border: none;
            border-radius: 10px;
            color: #030304;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,16,240,0.3);
        }

        .btn-google {
            background: #ffffff;
            color: #030304;
            border: 1px solid #dadce0;
            margin-top: 10px;
        }

        .btn-google:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-google i {
            color: #4285f4;
            margin-right: 10px;
        }

        .toggle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 14px;
        }

        .toggle:hover {
            color: #00F5FF;
        }

        .error-message {
            background: rgba(255,16,240,0.2);
            border: 1px solid #FF10F0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #FF10F0;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(0,245,255,0.2);
            border: 1px solid #00F5FF;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #00F5FF;
            text-align: center;
            display: none;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 20px 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,16,240,0.3);
            z-index: 1;
        }

        .divider span {
            background: #030304;
            padding: 0 10px;
            color: rgba(255,255,255,0.5);
            position: relative;
            z-index: 2;
            font-size: 12px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
        }

        .back-link a:hover {
            color: #00F5FF;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            color: #030304;
            border-radius: 40px;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="logo">SHOPVERSE</a>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn" onclick="login()">Login</button>
                <p class="toggle" onclick="showSignup()">Don't have an account? Sign up</p>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" style="display: none;">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="••••••••">
                </div>
                <button class="btn" onclick="signup()">Sign Up</button>
                <p class="toggle" onclick="showLogin()">Already have an account? Login</p>
            </div>
            
            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>
            
            <!-- Google Sign-In Button -->
            <button class="btn btn-google" onclick="googleSignIn()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Shopping</a>
            </div>
        </div>
    </div>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = message;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ===== GOOGLE SIGN-IN FUNCTION =====
        window.googleSignIn = function() {
            // Show loading
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting to Google...';
            
            // Create Google provider
            const provider = new firebase.auth.GoogleAuthProvider();
            
            // Optional: Add scopes
            provider.addScope('profile');
            provider.addScope('email');
            
            // Optional: Set custom parameters
            provider.setCustomParameters({
                'prompt': 'select_account'  // Always show account selection
            });
            
            // Sign in with popup
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Get user info
                    const user = result.user;
                    
                    console.log('✅ Google Sign-In successful:', user.email);
                    
                    // Check if user exists in Firestore
                    return db.collection('users').doc(user.uid).get().then((doc) => {
                        if (!doc.exists) {
                            // Create new user document for Google Sign-In
                            return db.collection('users').doc(user.uid).set({
                                name: user.displayName || 'User',
                                email: user.email,
                                photoURL: user.photoURL || '',
                                isAdmin: false,
                                authProvider: 'google',
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                                orders: [],
                                wishlist: []
                            });
                        } else {
                            // Update last login for existing user
                            return db.collection('users').doc(user.uid).update({
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    });
                })
                .then(() => {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('❌ Google Sign-In error:', error);
                    
                    // Handle specific errors
                    if (error.code === 'auth/popup-closed-by-user') {
                        showError('Sign-in cancelled. Please try again.');
                    } else if (error.code === 'auth/account-exists-with-different-credential') {
                        showError('An account already exists with this email. Please login with email/password.');
                    } else if (error.code === 'auth/popup-blocked') {
                        showError('Popup was blocked by your browser. Please allow popups for this site.');
                    } else {
                        showError(error.message);
                    }
                    
                    // Reset button
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // LOGIN FUNCTION
        window.login = function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Please fill all fields');
                return;
            }
            
            // Show loading
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log('✅ Login successful:', user.email);
                    
                    // Update last login time in Firestore
                    return db.collection('users').doc(user.uid).update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(err => {
                        // If document doesn't exist, create it
                        console.log('Creating missing user document...');
                        return db.collection('users').doc(user.uid).set({
                            name: user.displayName || 'User',
                            email: user.email,
                            isAdmin: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                })
                .then(() => {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('❌ Login error:', error);
                    
                    if (error.code === 'auth/user-not-found') {
                        showError('No account found with this email. Please sign up.');
                    } else if (error.code === 'auth/wrong-password') {
                        showError('Incorrect password.');
                    } else if (error.code === 'auth/invalid-email') {
                        showError('Invalid email format.');
                    } else if (error.code === 'auth/too-many-requests') {
                        showError('Too many failed attempts. Try again later.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // SIGNUP FUNCTION
        window.signup = function() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (!name || !email || !password || !confirmPassword) {
                showError('Please fill all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Show loading
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // Update profile with name
                    return user.updateProfile({ displayName: name }).then(() => {
                        // Create user document in Firestore
                        return db.collection('users').doc(user.uid).set({
                            name: name,
                            email: email,
                            isAdmin: false,
                            authProvider: 'email',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                            orders: [],
                            wishlist: []
                        });
                    });
                })
                .then(() => {
                    console.log('✅ User registered successfully');
                    showSuccess('Account created! Redirecting...');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch(error => {
                    console.error('❌ Signup error:', error);
                    
                    if (error.code === 'auth/email-already-in-use') {
                        showError('This email is already registered. Please login.');
                    } else if (error.code === 'auth/weak-password') {
                        showError('Password should be at least 6 characters.');
                    } else if (error.code === 'auth/invalid-email') {
                        showError('Please enter a valid email address.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // Toggle between login and signup
        window.showSignup = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        };

        window.showLogin = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
        };

        // Check auth state
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log('✅ User logged in:', user.email);
            }
        });
    </script>
</body>
</html>
