<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #232f3e; --secondary: #37475a; --accent: #ff9900; --background: #ffffff;
            --text: #0f1111; --text-light: #565959; --border: #dddddd; --card-bg: #ffffff;
        }
        .dark-mode {
            --primary: #131921; --secondary: #232f3e; --accent: #ff9900; --background: #0f171e;
            --text: #ffffff; --text-light: #a0a0a0; --border: #3a3a3a; --card-bg: #1a242b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .auth-container { width: 100%; max-width: 400px; padding: 20px; }
        .auth-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 30px;
            color: var(--primary); text-decoration: none; display: block;
        }
        .logo span { color: var(--accent); }
        h2 { text-align: center; margin-bottom: 30px; color: var(--text); }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; color: var(--text-light);
            font-size: 13px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 14px; background: var(--background);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 14px;
        }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; margin: 10px 0;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-google {
            background: transparent; border: 2px solid var(--border); color: var(--text);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google i { color: #4285f4; }
        .toggle {
            text-align: center; color: var(--text-light); cursor: pointer;
            font-size: 14px; margin-top: 15px;
        }
        .divider {
            position: relative; text-align: center; margin: 20px 0;
        }
        .divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: var(--border); z-index: 1;
        }
        .divider span {
            background: var(--card-bg); padding: 0 10px; color: var(--text-light);
            position: relative; z-index: 2; font-size: 12px;
        }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--text-light); text-decoration: none; }
        .error-message {
            background: rgba(255,0,0,0.1); border: 1px solid #ff0000;
            border-radius: 8px; padding: 12px; margin-bottom: 20px;
            color: #ff0000; text-align: center; display: none;
        }
        .theme-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; z-index: 9999;
        }
        .notification {
            position: fixed; top: 100px; right: 20px; padding: 12px 24px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div id="errorMessage" class="error-message"></div>

            <div id="loginForm">
                <h2>Sign In</h2>
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
                <button class="btn btn-primary" onclick="login()">Sign In</button>
                <p class="toggle" onclick="showSignup()">Create new account</p>
            </div>

            <div id="signupForm" style="display:none">
                <h2>Create Account</h2>
                <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="John Doe"></div>
                <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••"></div>
                <div class="form-group"><label>Confirm</label><input type="password" id="signupConfirm" placeholder="••••••••"></div>
                <button class="btn btn-primary" onclick="signup()">Sign Up</button>
                <p class="toggle" onclick="showLogin()">Back to Sign In</p>
            </div>

            <div class="divider"><span>OR</span></div>
            <button class="btn btn-google" onclick="googleSignIn()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> Back</a></div>
        </div>
    </div>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-sun" id="themeIcon"></i>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        function showError(msg) {
            const e = document.getElementById('errorMessage');
            e.style.display = 'block';
            e.textContent = msg;
            setTimeout(() => e.style.display = 'none', 3000);
        }
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }

        window.googleSignIn = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => window.location.href = 'index.html')
                .catch(error => showError(error.message));
        };

        window.login = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => window.location.href = 'index.html')
                .catch(error => showError(error.message));
        };

        window.signup = () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            if (pass !== confirm) return showError('Passwords do not match');
            auth.createUserWithEmailAndPassword(email, pass)
                .then(result => {
                    return result.user.updateProfile({ displayName: name }).then(() => {
                        return db.collection('users').doc(result.user.uid).set({
                            name, email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                })
                .then(() => window.location.href = 'index.html')
                .catch(error => showError(error.message));
        };

        window.showSignup = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        };
        window.showLogin = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
        };
    </script>
</body>
</html>
