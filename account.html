<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030304;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(255,16,240,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(0,245,255,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4),
                        0 0 0 1px rgba(255,16,240,0.1) inset;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: block;
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 500;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #FF10F0;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00F5FF;
            box-shadow: 0 0 0 4px rgba(0,245,255,0.1);
            background: rgba(255,255,255,0.08);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 4px;
            cursor: pointer;
            accent-color: #FF10F0;
        }

        .forgot-link {
            color: #00F5FF;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .forgot-link:hover {
            color: #FF10F0;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            color: #030304;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,16,240,0.3);
        }

        .btn-google {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,16,240,0.3);
            color: white;
            margin: 20px 0;
        }

        .btn-google:hover {
            background: rgba(255,16,240,0.15);
            border-color: #00F5FF;
            transform: translateY(-2px);
        }

        .btn-google i {
            color: #4285f4;
            font-size: 20px;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 24px 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,16,240,0.5), transparent);
            z-index: 1;
        }

        .divider span {
            background: #030304;
            padding: 0 16px;
            color: rgba(255,255,255,0.5);
            position: relative;
            z-index: 2;
            font-size: 13px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            border-color: #00F5FF;
            background: rgba(255,16,240,0.1);
        }

        .social-btn.facebook:hover { color: #1877f2; }
        .social-btn.twitter:hover { color: #1da1f2; }
        .social-btn.github:hover { color: #fff; }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .signup-link a {
            color: #00F5FF;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s;
        }

        .signup-link a:hover {
            color: #FF10F0;
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255,16,240,0.15);
            border: 1px solid #FF10F0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #FF10F0;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .success-message {
            background: rgba(0,245,255,0.15);
            border: 1px solid #00F5FF;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #00F5FF;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            color: #030304;
            border-radius: 40px;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 10px 30px rgba(255,16,240,0.3);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #00F5FF;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="logo">ZYVORASHOP</a>
            
            <h2>Welcome Back</h2>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="login(event)">
                <div class="form-group">
                    <label>Username or Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="signup-link">
                Don't have an account? <a href="#" onclick="showSignup()">Create one</a>
            </div>
            
            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>
            
            <!-- Google Sign-In Button -->
            <button class="btn btn-google" onclick="googleSignIn()" id="googleBtn">
                <i class="fab fa-google"></i> Log in with Google
            </button>
            
            <!-- Social Login (Optional) -->
            <div class="social-login">
                <button class="social-btn facebook" onclick="socialLogin('facebook')">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="social-btn twitter" onclick="socialLogin('twitter')">
                    <i class="fab fa-twitter"></i>
                </button>
                <button class="social-btn github" onclick="socialLogin('github')">
                    <i class="fab fa-github"></i>
                </button>
            </div>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Shopping</a>
            </div>
        </div>
    </div>

    <!-- Signup Modal (Hidden by default) -->
    <div class="modal" id="signupModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(3,3,4,0.9); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: rgba(3,3,4,0.95); border: 1px solid rgba(255,16,240,0.3); border-radius: 24px; max-width: 400px; width: 90%; padding: 40px;">
            <span class="modal-close" onclick="closeSignupModal()" style="position: absolute; top: 20px; right: 25px; font-size: 28px; color: rgba(255,255,255,0.5); cursor: pointer;">&times;</span>
            <h3 class="modal-title" style="font-family: 'Cormorant Garamond'; font-size: 28px; margin-bottom: 30px; background: linear-gradient(135deg, #FF10F0, #00F5FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Create Account</h3>
            
            <form onsubmit="signup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 20px;">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </form>
        </div>
    </div>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== SHOW/HIDE FUNCTIONS =====
        window.showSignup = function() {
            document.getElementById('signupModal').style.display = 'flex';
        };

        window.closeSignupModal = function() {
            document.getElementById('signupModal').style.display = 'none';
        };

        // ===== NOTIFICATION FUNCTIONS =====
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.textContent = message;
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 2000);
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // ===== LOGIN FUNCTION =====
        window.login = function(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showError('Please fill all fields');
                return;
            }
            
            // Show loading
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            // Set persistence based on remember me
            const persistence = rememberMe 
                ? firebase.auth.Auth.Persistence.LOCAL 
                : firebase.auth.Auth.Persistence.SESSION;
            
            auth.setPersistence(persistence)
                .then(() => {
                    return auth.signInWithEmailAndPassword(email, password);
                })
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log('✅ Login successful:', user.email);
                    
                    // Update last login
                    return db.collection('users').doc(user.uid).update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(() => {
                        // Create user doc if doesn't exist
                        return db.collection('users').doc(user.uid).set({
                            email: user.email,
                            name: user.displayName || 'User',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                })
                .then(() => {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('❌ Login error:', error);
                    
                    if (error.code === 'auth/user-not-found') {
                        showError('No account found with this email. Please sign up.');
                    } else if (error.code === 'auth/wrong-password') {
                        showError('Incorrect password.');
                    } else if (error.code === 'auth/invalid-email') {
                        showError('Invalid email format.');
                    } else if (error.code === 'auth/too-many-requests') {
                        showError('Too many failed attempts. Try again later.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // ===== SIGNUP FUNCTION =====
        window.signup = function(event) {
            event.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (!name || !email || !password || !confirmPassword) {
                showError('Please fill all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Show loading
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // Update profile with name
                    return user.updateProfile({ displayName: name }).then(() => {
                        // Create user document
                        return db.collection('users').doc(user.uid).set({
                            name: name,
                            email: email,
                            isAdmin: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                })
                .then(() => {
                    console.log('✅ User registered successfully');
                    showSuccess('Account created! Redirecting...');
                    closeSignupModal();
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch(error => {
                    console.error('❌ Signup error:', error);
                    
                    if (error.code === 'auth/email-already-in-use') {
                        showError('This email is already registered. Please login.');
                    } else if (error.code === 'auth/weak-password') {
                        showError('Password should be at least 6 characters.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // ===== GOOGLE SIGN-IN =====
        window.googleSignIn = function() {
            const btn = document.getElementById('googleBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting to Google...';
            
            const provider = new firebase.auth.GoogleAuthProvider();
            
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    console.log('✅ Google Sign-In successful:', user.email);
                    
                    // Check if user exists in Firestore
                    return db.collection('users').doc(user.uid).get().then((doc) => {
                        if (!doc.exists) {
                            // Create new user document
                            return db.collection('users').doc(user.uid).set({
                                name: user.displayName,
                                email: user.email,
                                photoURL: user.photoURL,
                                isAdmin: false,
                                authProvider: 'google',
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        } else {
                            // Update last login
                            return db.collection('users').doc(user.uid).update({
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    });
                })
                .then(() => {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('❌ Google Sign-In error:', error);
                    
                    if (error.code === 'auth/popup-closed-by-user') {
                        showError('Sign-in cancelled. Please try again.');
                    } else if (error.code === 'auth/popup-blocked') {
                        showError('Popup blocked. Please allow popups for this site.');
                    } else if (error.code === 'auth/unauthorized-domain') {
                        showError('Domain not authorized. Please contact support.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
        };

        // ===== FORGOT PASSWORD =====
        window.forgotPassword = function() {
            const email = document.getElementById('loginEmail').value;
            
            if (!email) {
                showError('Please enter your email first');
                return;
            }
            
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showSuccess('Password reset email sent! Check your inbox.');
                })
                .catch((error) => {
                    showError(error.message);
                });
        };

        // ===== SOCIAL LOGIN (Placeholder) =====
        window.socialLogin = function(provider) {
            showNotification(`${provider} login coming soon!`);
        };

        // ===== CHECK AUTH STATE =====
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log('✅ User logged in:', user.email);
                // Optional: Auto-redirect if already logged in
                // window.location.href = 'index.html';
            }
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('signupModal');
            if (event.target === modal) {
                closeSignupModal();
            }
        };
    </script>
</body>

</html>
