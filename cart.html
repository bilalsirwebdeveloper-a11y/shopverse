<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #232f3e; --secondary: #37475a; --accent: #ff9900; --background: #ffffff;
            --text: #0f1111; --text-light: #565959; --border: #dddddd; --card-bg: #ffffff;
        }
        .dark-mode {
            --primary: #131921; --secondary: #232f3e; --accent: #ff9900; --background: #0f171e;
            --text: #ffffff; --text-light: #a0a0a0; --border: #3a3a3a; --card-bg: #1a242b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            transition: background 0.3s;
        }
        .header {
            background: var(--primary); padding: 12px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .header-content {
            max-width: 1500px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 24px; font-weight: 700; color: white; text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .header-icons {
            display: flex; gap: 25px; align-items: center;
        }
        .icon-btn {
            position: relative; color: white; font-size: 20px; cursor: pointer;
        }
        .badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent); color: #000; font-size: 11px; padding: 2px 6px; border-radius: 20px;
        }
        .theme-toggle {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white;
        }
        .container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
        }
        .page-title {
            font-size: 32px; margin-bottom: 30px;
        }
        .empty-cart {
            text-align: center; padding: 60px;
        }
        .empty-cart i {
            font-size: 80px; color: var(--text-light); margin-bottom: 20px;
        }
        .shop-now-btn {
            padding: 15px 40px; background: var(--accent); border: none;
            border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .cart-items {
            display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px;
        }
        .cart-item {
            display: grid; grid-template-columns: 100px 1fr auto auto;
            gap: 20px; align-items: center; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 10px; padding: 20px;
        }
        .cart-item img {
            width: 100px; height: 100px; object-fit: cover; border-radius: 8px;
        }
        .item-details h3 { margin-bottom: 5px; }
        .item-details .price { color: var(--accent); }
        .cart-summary {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 30px; margin-top: 30px;
        }
        .summary-row {
            display: flex; justify-content: space-between; margin-bottom: 15px;
        }
        .summary-row.total {
            font-size: 24px; font-weight: 700; color: var(--accent);
            border-top: 1px solid var(--border); padding-top: 15px;
        }
        .checkout-btn {
            width: 100%; padding: 16px; background: var(--accent);
            border: none; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer;
        }
        .notification {
            position: fixed; top: 100px; right: 20px; padding: 12px 24px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .cart-item { grid-template-columns: 80px 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'"><i class="far fa-user"></i></div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'"><i class="far fa-heart"></i><span class="badge" id="wishlistCount">0</span></div>
                <div class="icon-btn" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></div>
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>
        <div id="cartContent">Loading...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        auth.onAuthStateChanged(user => {
            if (!user) {
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-user-lock"></i>
                        <h2>Please login to view cart</h2>
                        <button class="shop-now-btn" onclick="window.location.href='account.html'">Login</button>
                    </div>
                `;
            } else {
                loadCart(user);
                loadCounts(user);
            }
        });

        async function loadCounts(user) {
            const wish = await db.collection('wishlist').where('userId', '==', user.uid).get();
            document.getElementById('wishlistCount').textContent = wish.size;
            const cart = await db.collection('cart').where('userId', '==', user.uid).get();
            document.getElementById('cartCount').textContent = cart.docs.reduce((s, d) => s + (d.data().quantity || 1), 0);
        }

        async function loadCart(user) {
            const cartSnap = await db.collection('cart').where('userId', '==', user.uid).get();
            if (cartSnap.empty) {
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Your cart is empty</h2>
                        <button class="shop-now-btn" onclick="window.location.href='products.html'">Shop Now</button>
                    </div>
                `;
                return;
            }
            // Simplified - show empty for demo
            document.getElementById('cartContent').innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Your cart has items</h2>
                    <button class="shop-now-btn" onclick="window.location.href='products.html'">Continue Shopping</button>
                </div>
            `;
        }
    </script>
</body>
</html>
