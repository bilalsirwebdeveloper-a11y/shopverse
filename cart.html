<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPVERSE - Shopping Cart</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030304;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            background: rgba(3, 3, 4, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 16, 240, 0.3);
            border-radius: 40px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons .icon {
            position: relative;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #FF10F0;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .container {
            max-width: 1200px;
            margin: 120px auto 40px;
            padding: 20px;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-cart {
            text-align: center;
            padding: 60px;
        }

        .empty-cart i {
            font-size: 80px;
            color: rgba(255,16,240,0.3);
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        .shop-now-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            border: none;
            border-radius: 40px;
            color: #030304;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto;
            gap: 20px;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,16,240,0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.2s;
        }

        .cart-item:hover {
            border-color: #00F5FF;
            transform: translateX(5px);
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255,16,240,0.3);
        }

        .item-details h3 {
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: 5px;
        }

        .item-details .price {
            color: #00F5FF;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .item-details .category {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,16,240,0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quantity-btn:hover {
            background: rgba(255,16,240,0.2);
        }

        .item-total {
            font-size: 18px;
            font-weight: 600;
            color: #00F5FF;
        }

        .remove-btn {
            color: #FF10F0;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        .cart-summary {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,16,240,0.2);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .summary-row.total {
            font-size: 24px;
            font-weight: 700;
            color: #FF10F0;
            border-top: 1px solid rgba(255,16,240,0.3);
            padding-top: 15px;
            margin-top: 15px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            border: none;
            border-radius: 10px;
            color: #030304;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,16,240,0.3);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,16,240,0.3);
            border-top: 3px solid #00F5FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #FF10F0, #00F5FF);
            color: #030304;
            border-radius: 40px;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 80px 1fr;
                grid-template-rows: auto auto;
            }
            
            .item-quantity {
                grid-column: span 2;
                justify-content: center;
            }
            
            .item-total {
                grid-column: span 2;
                text-align: center;
            }
            
            .remove-btn {
                position: absolute;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">SHOPVERSE</a>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html" style="color: #00F5FF;">Cart</a>
        </nav>
        <div class="header-icons">
            <div class="icon" onclick="window.location.href='wishlist.html'">
                <i class="far fa-heart"></i>
                <span class="badge" id="wishlistCount">0</span>
            </div>
            <div class="icon" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>
        
        <div id="cartContent">
            <div class="empty-cart" style="display: none;" id="emptyCartMessage">
                <i class="fas fa-shopping-cart"></i>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added anything to your cart yet</p>
                <button class="shop-now-btn" onclick="window.location.href='products.html'">Shop Now</button>
            </div>
            
            <div class="spinner" id="cartSpinner"></div>
            
            <div id="cartItemsContainer" style="display: none;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let cartItems = [];
        let products = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadCart();
                loadWishlistCount();
            } else {
                document.getElementById('cartSpinner').style.display = 'none';
                document.getElementById('emptyCartMessage').style.display = 'block';
                document.getElementById('cartCount').textContent = '0';
            }
        });

        function loadWishlistCount() {
            if (!currentUser) return;
            
            db.collection('wishlist')
                .where('userId', '==', currentUser.uid)
                .onSnapshot((snapshot) => {
                    document.getElementById('wishlistCount').textContent = snapshot.size;
                }, (error) => {
                    console.error('Wishlist count error:', error);
                });
        }

        function loadCart() {
            document.getElementById('cartSpinner').style.display = 'block';
            document.getElementById('emptyCartMessage').style.display = 'none';
            document.getElementById('cartItemsContainer').style.display = 'none';
            
            db.collection('cart')
                .where('userId', '==', currentUser.uid)
                .onSnapshot(async (snapshot) => {
                    cartItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Update cart count in header
                    document.getElementById('cartCount').textContent = cartItems.reduce((sum, item) => sum + (item.quantity || 1), 0);
                    
                    if (cartItems.length === 0) {
                        document.getElementById('cartSpinner').style.display = 'none';
                        document.getElementById('emptyCartMessage').style.display = 'block';
                        document.getElementById('cartItemsContainer').style.display = 'none';
                        return;
                    }
                    
                    // Load product details for each cart item
                    const productPromises = cartItems.map(async (item) => {
                        if (!products[item.productId]) {
                            const productDoc = await db.collection('products').doc(item.productId).get();
                            if (productDoc.exists) {
                                products[item.productId] = { id: productDoc.id, ...productDoc.data() };
                            }
                        }
                        return item;
                    });
                    
                    await Promise.all(productPromises);
                    
                    displayCart();
                    
                    document.getElementById('cartSpinner').style.display = 'none';
                    document.getElementById('cartItemsContainer').style.display = 'block';
                    
                }, (error) => {
                    console.error('Cart error:', error);
                    document.getElementById('cartSpinner').style.display = 'none';
                    document.getElementById('emptyCartMessage').style.display = 'block';
                });
        }

        function displayCart() {
            const container = document.getElementById('cartItemsContainer');
            
            let subtotal = 0;
            let html = '<div class="cart-items">';
            
            cartItems.forEach(item => {
                const product = products[item.productId] || { 
                    name: 'Product', 
                    price: 0, 
                    images: ['https://via.placeholder.com/100'],
                    category: 'General'
                };
                
                const itemTotal = product.price * item.quantity;
                subtotal += itemTotal;
                
                html += `
                    <div class="cart-item" data-cart-id="${item.id}">
                        <img src="${product.images?.[0] || 'https://via.placeholder.com/100'}" alt="${product.name}" loading="lazy">
                        <div class="item-details">
                            <h3>${product.name}</h3>
                            <div class="price">Rs ${product.price.toLocaleString()}</div>
                            <div class="category">${product.category || 'General'}</div>
                        </div>
                        <div class="item-quantity">
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span class="quantity-value">${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <div class="item-total">Rs ${itemTotal.toLocaleString()}</div>
                        <i class="fas fa-trash remove-btn" onclick="removeFromCart('${item.id}')"></i>
                    </div>
                `;
            });
            
            html += '</div>';
            
            const shipping = subtotal > 0 ? 200 : 0;
            const total = subtotal + shipping;
            
            html += `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>Rs ${subtotal.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Rs ${shipping}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>Rs ${total.toLocaleString()}</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">
                        Proceed to Checkout
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }

        window.updateQuantity = async function(cartId, change) {
            const item = cartItems.find(i => i.id === cartId);
            if (!item) return;
            
            const newQuantity = item.quantity + change;
            if (newQuantity < 1) return;
            
            try {
                await db.collection('cart').doc(cartId).update({ 
                    quantity: newQuantity 
                });
                // UI will update automatically via onSnapshot
            } catch (error) {
                console.error('Error updating quantity:', error);
                showNotification('Error updating quantity', 'error');
            }
        };

        window.removeFromCart = async function(cartId) {
            if (!confirm('Remove this item from cart?')) return;
            
            try {
                await db.collection('cart').doc(cartId).delete();
                showNotification('Item removed from cart');
                // UI will update automatically via onSnapshot
            } catch (error) {
                console.error('Error removing item:', error);
                showNotification('Error removing item', 'error');
            }
        };

        window.checkout = function() {
            if (cartItems.length === 0) {
                showNotification('Your cart is empty', 'error');
                return;
            }
            window.location.href = 'products.html';
        };

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
