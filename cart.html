<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYVORASHOP - Shopping Cart</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --background: #f9f9f9;
            --text: #0f1111;
            --text-light: #666;
            --border: #e0e0e0;
            --card-bg: #ffffff;
            --gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .dark-mode {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #e94560;
            --background: #121212;
            --text: #ffffff;
            --text-light: #b0b0b0;
            --border: #2d2d2d;
            --card-bg: #1e1e1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
        }

        .header {
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .theme-toggle {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }

        .theme-toggle:hover {
            background: var(--accent);
            transform: rotate(180deg);
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto auto;
            gap: 20px;
            align-items: center;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-details h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .item-details .price {
            color: var(--accent);
            font-weight: 600;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .qty-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .qty-value {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .item-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .remove-btn {
            color: var(--accent);
            cursor: pointer;
            font-size: 20px;
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        /* Cart Summary */
        .cart-summary {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .summary-total {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }

        .continue-shopping {
            display: block;
            text-align: center;
            color: var(--text-light);
            text-decoration: none;
        }

        .continue-shopping:hover {
            color: var(--accent);
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 60px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 30px;
        }

        .empty-cart i {
            font-size: 80px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .shop-now-btn {
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .shop-now-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            border-radius: 15px;
            color: var(--text);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 992px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 80px 1fr;
                grid-template-rows: auto auto;
            }
            .item-quantity, .item-total, .remove-btn {
                grid-column: span 2;
                justify-self: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <div class="header-icons">
                <div class="icon-btn" onclick="window.location.href='account.html'">
                    <i class="far fa-user"></i>
                </div>
                <div class="icon-btn" onclick="window.location.href='wishlist.html'">
                    <i class="far fa-heart"></i>
                    <span class="badge" id="wishlistCount">0</span>
                </div>
                <div class="icon-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cartCount">0</span>
                </div>
                <div class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-sun" id="themeIcon"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>
        
        <div id="cartContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your cart...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let cartItems = [];
        let products = {};

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-moon';
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadCart();
                loadCounts();
            } else {
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-user-lock"></i>
                        <h2>Please Login</h2>
                        <p>You need to be logged in to view your cart</p>
                        <button class="shop-now-btn" onclick="window.location.href='account.html'">Login Now</button>
                    </div>
                `;
                document.getElementById('wishlistCount').textContent = '0';
                document.getElementById('cartCount').textContent = '0';
            }
        });

        async function loadCounts() {
            if (!currentUser) return;
            
            try {
                const wishSnap = await db.collection('wishlist').where('userId', '==', currentUser.uid).get();
                document.getElementById('wishlistCount').textContent = wishSnap.size;
                
                const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
                document.getElementById('cartCount').textContent = cartSnap.docs.reduce((sum, doc) => sum + (doc.data().quantity || 1), 0);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadCart() {
            try {
                const cartSnap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
                cartItems = cartSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                if (cartItems.length === 0) {
                    document.getElementById('cartContent').innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <h2>Your Cart is Empty</h2>
                            <p>Looks like you haven't added anything to your cart yet</p>
                            <button class="shop-now-btn" onclick="window.location.href='products.html'">Shop Now</button>
                        </div>
                    `;
                    return;
                }
                
                // Load product details
                const productPromises = cartItems.map(async (item) => {
                    if (!products[item.productId]) {
                        const productDoc = await db.collection('products').doc(item.productId).get();
                        if (productDoc.exists) {
                            products[item.productId] = { id: productDoc.id, ...productDoc.data() };
                        }
                    }
                });
                
                await Promise.all(productPromises);
                displayCart();
                
            } catch (error) {
                console.error('Error loading cart:', error);
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Error Loading Cart</h2>
                        <p>Please try again later</p>
                        <button class="shop-now-btn" onclick="window.location.reload()">Refresh</button>
                    </div>
                `;
            }
        }

        function displayCart() {
            let subtotal = 0;
            let html = '<div class="cart-container"><div class="cart-items">';
            
            cartItems.forEach(item => {
                const product = products[item.productId] || {
                    name: 'Unknown Product',
                    price: 0,
                    images: ['https://via.placeholder.com/100']
                };
                
                const itemTotal = product.price * item.quantity;
                subtotal += itemTotal;
                
                html += `
                    <div class="cart-item" data-cart-id="${item.id}">
                        <img src="${product.images?.[0] || 'https://via.placeholder.com/100'}" alt="${product.name}">
                        <div class="item-details">
                            <h3>${product.name}</h3>
                            <div class="price">Rs ${product.price.toLocaleString()}</div>
                        </div>
                        <div class="item-quantity">
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <div class="item-total">Rs ${itemTotal.toLocaleString()}</div>
                        <i class="fas fa-trash remove-btn" onclick="removeFromCart('${item.id}')"></i>
                    </div>
                `;
            });
            
            const shipping = subtotal > 2000 ? 0 : 200;
            const total = subtotal + shipping;
            
            html += `
                    </div>
                    <div class="cart-summary">
                        <h3 class="summary-title">Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>Rs ${subtotal.toLocaleString()}</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span>${shipping === 0 ? 'Free' : 'Rs ' + shipping}</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span>
                            <span>Rs ${total.toLocaleString()}</span>
                        </div>
                        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                        <a href="products.html" class="continue-shopping">← Continue Shopping</a>
                    </div>
                </div>
            `;
            
            document.getElementById('cartContent').innerHTML = html;
        }

        window.updateQuantity = async function(cartId, change) {
            const item = cartItems.find(i => i.id === cartId);
            if (!item) return;
            
            const newQuantity = item.quantity + change;
            if (newQuantity < 1) return;
            
            try {
                await db.collection('cart').doc(cartId).update({ quantity: newQuantity });
                item.quantity = newQuantity;
                displayCart();
                loadCounts();
            } catch (error) {
                showNotification('Error updating quantity', 'error');
            }
        };

        window.removeFromCart = async function(cartId) {
            if (!confirm('Remove this item from cart?')) return;
            
            try {
                await db.collection('cart').doc(cartId).delete();
                cartItems = cartItems.filter(i => i.id !== cartId);
                
                if (cartItems.length === 0) {
                    document.getElementById('cartContent').innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <h2>Your Cart is Empty</h2>
                            <p>Looks like you haven't added anything to your cart yet</p>
                            <button class="shop-now-btn" onclick="window.location.href='products.html'">Shop Now</button>
                        </div>
                    `;
                } else {
                    displayCart();
                }
                loadCounts();
                showNotification('Item removed from cart');
            } catch (error) {
                showNotification('Error removing item', 'error');
            }
        };

        window.checkout = function() {
            window.location.href = 'products.html';
        };

        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }
    </script>
</body>
</html>
