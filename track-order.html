<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - ZYVORASHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f3f3;
        }

        .header {
            background: #131921;
            padding: 15px 20px;
        }

        .header-content {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: #ff9900;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tracking-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tracking-header {
            margin-bottom: 40px;
        }

        .tracking-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .order-info {
            display: flex;
            gap: 30px;
            color: #666;
        }

        /* Tracking Timeline */
        .tracking-timeline {
            position: relative;
            margin: 50px 0;
        }

        .timeline-line {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #e0e0e0;
            z-index: 1;
        }

        .timeline-progress {
            position: absolute;
            top: 25px;
            left: 0;
            width: 0%;
            height: 3px;
            background: #4CAF50;
            z-index: 2;
            transition: width 1s ease;
        }

        .timeline-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .timeline-step {
            text-align: center;
            flex: 1;
        }

        .step-icon {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            position: relative;
            z-index: 4;
            transition: all 0.3s;
        }

        .step-icon.completed {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .step-icon.active {
            border-color: #ff9900;
            color: #ff9900;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .step-icon i {
            font-size: 20px;
        }

        .step-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .step-date {
            font-size: 13px;
            color: #666;
        }

        /* Order Details */
        .order-details {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 30px;
            margin: 40px 0;
        }

        .detail-section {
            margin-bottom: 30px;
        }

        .detail-section h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-item .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-item .value {
            font-weight: 600;
        }

        .tracking-map {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            margin-top: 20px;
        }

        .tracking-map i {
            font-size: 40px;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            .timeline-steps {
                flex-direction: column;
                gap: 30px;
            }
            
            .timeline-line, .timeline-progress {
                display: none;
            }
            
            .timeline-step {
                display: flex;
                align-items: center;
                text-align: left;
                gap: 20px;
            }
            
            .step-icon {
                margin: 0;
            }
            
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
            <a href="orders.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Orders</a>
        </div>
    </header>

    <div class="container">
        <div class="tracking-card">
            <div class="tracking-header">
                <h1>Track Your Order</h1>
                <div class="order-info" id="orderInfo">
                    <span>Order #: <strong id="orderId">Loading...</strong></span>
                    <span>Status: <strong id="orderStatus">Loading...</strong></span>
                </div>
            </div>

            <div class="tracking-timeline">
                <div class="timeline-line"></div>
                <div class="timeline-progress" id="timelineProgress"></div>
                
                <div class="timeline-steps" id="timelineSteps">
                    <!-- Steps will be inserted here -->
                </div>
            </div>

            <div class="order-details" id="orderDetails">
                <!-- Order details will be inserted here -->
            </div>

            <div class="tracking-map">
                <i class="fas fa-map-marker-alt"></i>
                <span>Your package is on the way!</span>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function getOrderIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function getStatusProgress(status) {
            const statusMap = {
                'processing': 25,
                'shipped': 50,
                'out-for-delivery': 75,
                'delivered': 100
            };
            return statusMap[status] || 25;
        }

        function getStatusDate(status) {
            const dates = {
                'processing': 'Order Placed',
                'shipped': 'Shipped',
                'out-for-delivery': 'Out for Delivery',
                'delivered': 'Delivered'
            };
            return dates[status] || 'Processing';
        }

        async function loadOrder() {
            const orderId = getOrderIdFromUrl();
            
            if (!orderId) {
                window.location.href = 'orders.html';
                return;
            }

            document.getElementById('orderId').textContent = `#${orderId.slice(-8).toUpperCase()}`;

            try {
                const orderSnap = await db.collection('orders').doc(orderId).get();
                
                if (orderSnap.exists) {
                    const order = orderSnap.data();
                    const status = order.status || 'processing';
                    
                    document.getElementById('orderStatus').textContent = status.toUpperCase();
                    document.getElementById('timelineProgress').style.width = getStatusProgress(status) + '%';

                    const steps = [
                        { status: 'processing', icon: 'fa-clock', label: 'Order Placed' },
                        { status: 'shipped', icon: 'fa-box', label: 'Shipped' },
                        { status: 'out-for-delivery', icon: 'fa-truck', label: 'Out for Delivery' },
                        { status: 'delivered', icon: 'fa-home', label: 'Delivered' }
                    ];

                    let currentStepReached = false;
                    const stepsHtml = steps.map(step => {
                        const isCompleted = !currentStepReached && (
                            (step.status === 'processing' && status !== 'processing') ||
                            (step.status === 'shipped' && ['shipped', 'out-for-delivery', 'delivered'].includes(status)) ||
                            (step.status === 'out-for-delivery' && ['out-for-delivery', 'delivered'].includes(status)) ||
                            (step.status === 'delivered' && status === 'delivered')
                        );

                        const isActive = step.status === status;

                        if (isActive || isCompleted) {
                            currentStepReached = true;
                        }

                        return `
                            <div class="timeline-step">
                                <div class="step-icon ${isCompleted || isActive ? 'completed' : ''} ${isActive ? 'active' : ''}">
                                    <i class="fas ${step.icon}"></i>
                                </div>
                                <div>
                                    <div class="step-label">${step.label}</div>
                                    <div class="step-date">${isCompleted || isActive ? getStatusDate(status) : 'Pending'}</div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('timelineSteps').innerHTML = stepsHtml;

                    document.getElementById('orderDetails').innerHTML = `
                        <div class="detail-section">
                            <h3>Shipping Address</h3>
                            <div class="detail-item">
                                <span class="value">${order.shippingAddress?.fullName}</span>
                                <span class="value">${order.shippingAddress?.address}</span>
                                <span class="value">${order.shippingAddress?.city}, ${order.shippingAddress?.postalCode || ''}</span>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h3>Order Summary</h3>
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <span class="label">Items Total</span>
                                    <span class="value">Rs ${order.subtotal?.toLocaleString()}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label">Tax</span>
                                    <span class="value">Rs ${order.tax?.toLocaleString()}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label">Total Amount</span>
                                    <span class="value">Rs ${order.total?.toLocaleString()}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label">Payment Method</span>
                                    <span class="value">${order.paymentMethod}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading order:', error);
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                loadOrder();
            } else {
                window.location.href = 'account.html';
            }
        });
    </script>
</body>
</html>
