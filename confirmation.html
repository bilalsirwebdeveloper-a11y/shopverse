<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - ZYVORASHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .header {
            background: #131921;
            padding: 15px 20px;
        }

        .header-content {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo span {
            color: #ff9900;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .confirmation-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 120px;
            height: 120px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(76,175,80,0.7);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 0 20px rgba(76,175,80,0);
            }
        }

        .success-icon i {
            font-size: 60px;
            color: white;
        }

        .confirmation-card h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #131921;
        }

        .confirmation-card p {
            color: #666;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .order-number {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .order-number h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 5px;
        }

        .order-number .number {
            font-size: 24px;
            font-weight: 700;
            color: #ff9900;
            letter-spacing: 2px;
        }

        .order-details {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            font-weight: 600;
            color: #131921;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn-primary, .btn-secondary {
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: #ff9900;
            color: white;
        }

        .btn-primary:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,153,0,0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .confirmation-card {
                padding: 30px 20px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">ZYVORA<span>SHOP</span></a>
        </div>
    </header>

    <div class="container">
        <div class="confirmation-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <h1>Order Confirmed!</h1>
            <p>Thank you for shopping with ZYVORASHOP</p>
            <p style="font-size: 16px;">We've sent a confirmation email to your inbox</p>
            
            <div class="order-number" id="orderNumber">
                <!-- Order number will be inserted here -->
            </div>
            
            <div class="order-details" id="orderDetails">
                <!-- Order details will be inserted here -->
            </div>
            
            <div class="action-buttons">
                <a href="orders.html" class="btn-primary">Track Order</a>
                <a href="index.html" class="btn-secondary">Continue Shopping</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh2f98ybCR6Zn3RwsFuS6mT4e3PfwvnKs",
            authDomain: "shopverse-c2642.firebaseapp.com",
            projectId: "shopverse-c2642",
            storageBucket: "shopverse-c2642.firebasestorage.app",
            messagingSenderId: "281981664356",
            appId: "1:281981664356:web:3c4419cd75f279e4ba7371"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function getOrderIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadOrder() {
            const orderId = getOrderIdFromUrl();
            
            if (!orderId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const orderSnap = await db.collection('orders').doc(orderId).get();
                
                if (orderSnap.exists) {
                    const order = orderSnap.data();
                    
                    document.getElementById('orderNumber').innerHTML = `
                        <h3>Order Number</h3>
                        <div class="number">#${orderId.slice(-8).toUpperCase()}</div>
                    `;

                    document.getElementById('orderDetails').innerHTML = `
                        <div class="detail-row">
                            <span class="detail-label">Order Date:</span>
                            <span class="detail-value">${new Date().toLocaleDateString()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Total Amount:</span>
                            <span class="detail-value">Rs ${order.total?.toLocaleString()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Payment Method:</span>
                            <span class="detail-value">${order.paymentMethod}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Shipping to:</span>
                            <span class="detail-value">${order.shippingAddress?.city}</span>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading order:', error);
            }
        }

        loadOrder();
    </script>
</body>
</html>
